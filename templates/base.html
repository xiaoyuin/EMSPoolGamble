<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EMS Pool{% endblock %}</title>

    {# PWA #}
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#1890ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EMS Pool">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">

    {# 全站基础样式 #}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    {# 各页面专属样式（保留旧的内联 <style> 时用这个 block） #}
    {% block extra_styles %}{% endblock %}
    {% block head_extra %}{% endblock %}
</head>
<body>
    {# ---------- 顶部 header（版本 + 管理员状态） ---------- #}
    {% block header %}
    <div class="header">
        <div style="position: relative; display: flex; justify-content: center; align-items: center;">
            <h2 style="margin: 0;">{% block header_title %}EMS Pool{% endblock %}</h2>
            <div class="overflow-menu" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%);">
                <button class="overflow-menu-btn" onclick="document.getElementById('overflow-dropdown').classList.toggle('show')" aria-label="菜单">⋮</button>
                <div id="overflow-dropdown" class="overflow-dropdown">
                    <a href="#" id="pwa-install-item" style="display: none;" onclick="installPWA(); return false;">📲 安装到主屏幕</a>
                    <a href="#" id="pwa-ios-hint" style="display: none;" onclick="showIOSHint(); return false;">📲 安装到主屏幕</a>
                    <a href="https://github.com/xiaoyuin/EMSPoolGamble" target="_blank" rel="noopener">GitHub</a>
                </div>
            </div>
        </div>

        {% block version_info %}
        <div class="version-info">
            <span class="version-badge">{{ app_version }}</span>
            <span class="build-date">{{ version_date }}</span>
        </div>
        {% endblock %}

        {% if is_admin_authenticated() %}
        <div class="login-status">
            <div class="user-info">
                🔓 管理员模式已启用
                <a href="/admin_logout" class="logout-btn">退出管理员模式</a>
            </div>
            <div class="session-info">可以执行删除、结束场次等关键操作</div>
        </div>
        {% endif %}
    </div>
    {% endblock %}

    {# ---------- Flash 消息 ---------- #}
    {% block flash %}
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% endblock %}

    {# ---------- 页面主内容 ---------- #}
    {% block content %}{% endblock %}

    {# ---------- 底部链接区 ---------- #}
    {% block links %}
    <div class="links">
        <a href="/">返回首页</a> |
        <a href="/history">历史统计</a> |
        <a href="/achievements">特殊记录</a>
    </div>
    {% endblock %}

    {# ---------- Footer ---------- #}
    {% block footer %}
    <div class="footer">
        <p>© 2025-2026 EMS Pool | <a href="https://github.com/xiaoyuin/EMSPoolGamble" target="_blank" rel="noopener">GitHub</a></p>
    </div>
    {% endblock %}

    {# 全站基础脚本（含 UTC→本地时间转换） #}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }

    // PWA install — Android (beforeinstallprompt) vs iOS (manual hint)
    let _deferredPrompt = null;
    const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const _isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (_isIOS && !_isStandalone) {
        // iOS: show hint item (Safari share → Add to Home Screen)
        const iosItem = document.getElementById('pwa-ios-hint');
        if (iosItem) iosItem.style.display = '';
    }

    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        _deferredPrompt = e;
        const item = document.getElementById('pwa-install-item');
        if (item) item.style.display = '';
        // Hide iOS hint if Android prompt is available
        const iosItem = document.getElementById('pwa-ios-hint');
        if (iosItem) iosItem.style.display = 'none';
    });

    function installPWA() {
        if (!_deferredPrompt) return;
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(function() { _deferredPrompt = null; });
        const item = document.getElementById('pwa-install-item');
        if (item) item.style.display = 'none';
        const dd = document.getElementById('overflow-dropdown');
        if (dd) dd.classList.remove('show');
    }

    function showIOSHint() {
        const dd = document.getElementById('overflow-dropdown');
        if (dd) dd.classList.remove('show');
        alert('点击浏览器的分享按钮，选择「添加到主屏幕」');
    }

    window.addEventListener('appinstalled', function() {
        const item = document.getElementById('pwa-install-item');
        if (item) item.style.display = 'none';
    });

    // Close overflow menu on click outside
    document.addEventListener('click', function(e) {
        const dd = document.getElementById('overflow-dropdown');
        if (dd && dd.classList.contains('show') && !e.target.closest('.overflow-menu')) {
            dd.classList.remove('show');
        }
    });
    </script>

    {# 各页面专属脚本 #}
    {% block scripts %}{% endblock %}
</body>
</html>
